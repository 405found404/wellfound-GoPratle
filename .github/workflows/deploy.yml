name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Git Commit SHA to rollback to (7 characters)'
        required: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}                
  INSTANCE_ID_STAGING:  ${{ secrets.INSTANCE_ID_STAGING }}    
  IAM_ROLE_ARN: "arn:aws:iam::361450366058:role/GitHubActionsDeployRole "     
  GHCR_IMAGE:  ${{ secrets.GHCR_IMAGE }} 
  INSTANCE_ID_PROD: ${{ secrets.INSTANCE_ID_PROD }}  

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set outputs
        id: vars
        run: |
          if [ "${{ github.event.inputs.commit_sha }}" != "" ]; then
            echo "sha_short=${{ github.event.inputs.commit_sha }}" >> $GITHUB_OUTPUT
          else
            echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        if: github.event.inputs.commit_sha == ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        if: github.event.inputs.commit_sha == ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ steps.vars.outputs.sha_short }}
            ${{ env.GHCR_IMAGE }}:latest

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy to Staging (Port 8080)
        run: |
          aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID_STAGING }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "sudo docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}",
              "sudo docker network create app-network || true",
              "sudo docker stop gp-staging || true",
              "sudo docker rm gp-staging || true",
              "sudo docker pull ${{ env.GHCR_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}",
              "sudo docker run -d --name gp-staging --network app-network --restart unless-stopped -p 80:80 -p 443:443 -v /etc/ssl/cloudflare:/etc/nginx/ssl ${{ env.GHCR_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}"
            ]'

  deploy-production:
    needs: [build-and-push, deploy-staging]
    runs-on: ubuntu-latest
    environment: production  
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy to Production (Port 80)
        run: |
          aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID_PROD }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "sudo docker network create app-network || true",
              "sudo docker stop gp-prod || true",
              "sudo docker rm gp-prod || true",
              "sudo docker pull ${{ env.GHCR_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}",
              "sudo docker run -d --name gp-prod --network app-network --restart unless-stopped -p 80:80 -p 443:443 -v /etc/ssl/cloudflare:/etc/nginx/ssl ${{ env.GHCR_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}"
            ]'

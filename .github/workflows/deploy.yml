name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Git Commit SHA to rollback to'
        required: false

env:
  AWS_REGION: "ap-south-1"                   
  EC2_INSTANCE_ID: "i-001c879e236af973e"     
  IAM_ROLE_ARN: "arn:aws:iam::361450366058:role/GitHubActionsDeployRole"         
  GHCR_IMAGE: ghcr.io/405found404/wellfound-gopratle

permissions:
  id-token: write   # Required for OIDC handshake
  contents: read    # Required to checkout code
  packages: write   # Required to push to GitHub Container Registry

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha || github.sha }}

      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ steps.vars.outputs.sha_short }}
            ${{ env.GHCR_IMAGE }}:latest

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Staging (Port 8080)
        run: |
          aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}",
              "docker stop gp-staging || true",
              "docker rm gp-staging || true",
              "docker pull ${{ env.GHCR_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}",
              "docker run -d --name gp-staging -p 8080:8080 ${{ env.GHCR_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}"
            ]'

  deploy-production:
    needs: [build-and-push, deploy-staging]
    runs-on: ubuntu-latest
    environment: production  
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Production (Port 80)
        run: |
          aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "docker stop gp-prod || true",
              "docker rm gp-prod || true",
              "docker run -d --name gp-prod -p 8:8080 ${{ env.GHCR_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}"
            ]'